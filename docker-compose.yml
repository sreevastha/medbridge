version: '3.8'

services:
  frontend:
    build:
      context: ./layer1-frontend
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./layer1-frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app

