<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --mb-primary:#1456b8; --mb-primary-hover:#0e3f8f; --mb-primary-dark:#0e3a7a;
    --mb-primary-bright:#2b7cd3; --mb-primary-tint:#eaf1fb; --mb-primary-tint-2:#dbe7f8;
    --mb-teal:#0d9488; --mb-teal-tint:#e2f5f2;
    --mb-ink:#15233b; --mb-text:#26344b; --mb-text-2:#5b6b82; --mb-text-3:#8a97a8;
    --mb-border:#e2e8f0; --mb-border-strong:#cbd5e1;
    --mb-surface:#ffffff; --mb-bg:#f6f8fb; --mb-bg-subtle:#eef2f7;
    --mb-success:#1f8a5b; --mb-success-tint:#e6f4ee;
    --mb-r-md:10px; --mb-r-lg:14px;
    --mb-sh-card:0 1px 2px rgba(21,35,59,.04), 0 1px 3px rgba(21,35,59,.06);
    --mb-font:'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --mb-mono:'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
</style>
</helmet>
<div style="width:1440px; height:900px; display:flex; font-family:var(--mb-font); background:var(--mb-bg); color:var(--mb-text); -webkit-font-smoothing:antialiased; overflow:hidden;">

  <!-- ===================== SIDEBAR ===================== -->
  <aside style="width:256px; flex:none; background:var(--mb-surface); border-right:1px solid var(--mb-border); display:flex; flex-direction:column; padding:22px 16px;">

    <!-- Logo -->
    <div style="display:flex; align-items:center; gap:12px; padding:4px 8px 24px;">
      <div style="width:40px; height:40px; border-radius:11px; background:var(--mb-primary); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(20,86,184,.26);">
        <svg width="23" height="23" viewBox="0 0 24 24" fill="none"><path d="M4 15c2.6 0 2.6-6 5.2-6S11.8 15 14.4 15s2.6-6 5.2-6" stroke="#fff" stroke-width="2.1" stroke-linecap="round"/><circle cx="12" cy="5.5" r="1.6" fill="#fff"/></svg>
      </div>
      <span style="font-size:20px; font-weight:700; color:var(--mb-ink); letter-spacing:-.01em;">MedBridge</span>
    </div>

    <!-- Nav -->
    <nav style="display:flex; flex-direction:column; gap:4px;">
      <!-- Dashboard (selected) -->
      <a href="#" style="display:flex; align-items:center; gap:13px; height:46px; padding:0 14px; border-radius:10px; background:var(--mb-primary-tint); color:var(--mb-primary-dark); font-size:15px; font-weight:600; text-decoration:none; position:relative;">
        <span style="position:absolute; left:-16px; top:11px; bottom:11px; width:3px; border-radius:0 3px 3px 0; background:var(--mb-primary);"></span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.6" stroke="#0e3a7a" stroke-width="1.9"/><rect x="14" y="3" width="7" height="7" rx="1.6" stroke="#0e3a7a" stroke-width="1.9"/><rect x="3" y="14" width="7" height="7" rx="1.6" stroke="#0e3a7a" stroke-width="1.9"/><rect x="14" y="14" width="7" height="7" rx="1.6" stroke="#0e3a7a" stroke-width="1.9"/></svg>
        Dashboard
      </a>
      <!-- Patients -->
      <a href="#" style="display:flex; align-items:center; gap:13px; height:46px; padding:0 14px; border-radius:10px; color:var(--mb-text-2); font-size:15px; font-weight:500; text-decoration:none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.6" stroke="#5b6b82" stroke-width="1.9"/><path d="M5 19c0-3.5 3.2-5.4 7-5.4s7 1.9 7 5.4" stroke="#5b6b82" stroke-width="1.9" stroke-linecap="round"/></svg>
        Patients
      </a>
      <!-- Orders -->
      <a href="#" style="display:flex; align-items:center; gap:13px; height:46px; padding:0 14px; border-radius:10px; color:var(--mb-text-2); font-size:15px; font-weight:500; text-decoration:none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M5 6h14M5 6l1 13h12l1-13M5 6l-1-2.5" stroke="#5b6b82" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.5 10.5v5M14.5 10.5v5" stroke="#5b6b82" stroke-width="1.9" stroke-linecap="round"/></svg>
        Orders
      </a>
      <!-- Reports -->
      <a href="#" style="display:flex; align-items:center; gap:13px; height:46px; padding:0 14px; border-radius:10px; color:var(--mb-text-2); font-size:15px; font-weight:500; text-decoration:none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M7 4h7l4 4v12H7z" stroke="#5b6b82" stroke-width="1.9" stroke-linejoin="round"/><path d="M13 4v5h5" stroke="#5b6b82" stroke-width="1.9" stroke-linejoin="round"/><path d="M9.5 13h5M9.5 16h3" stroke="#5b6b82" stroke-width="1.9" stroke-linecap="round"/></svg>
        Reports
      </a>
      <!-- Admin -->
      <a href="#" style="display:flex; align-items:center; gap:13px; height:46px; padding:0 14px; border-radius:10px; color:var(--mb-text-2); font-size:15px; font-weight:500; text-decoration:none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 3l7 3v5.5c0 4.4-3 7.9-7 9.5-4-1.6-7-5.1-7-9.5V6l7-3z" stroke="#5b6b82" stroke-width="1.9" stroke-linejoin="round"/><circle cx="12" cy="10" r="2.2" stroke="#5b6b82" stroke-width="1.9"/><path d="M8.6 15.4c.6-1.5 2-2.1 3.4-2.1s2.8.6 3.4 2.1" stroke="#5b6b82" stroke-width="1.9" stroke-linecap="round"/></svg>
        Admin
      </a>
      <!-- Settings -->
      <a href="#" style="display:flex; align-items:center; gap:13px; height:46px; padding:0 14px; border-radius:10px; color:var(--mb-text-2); font-size:15px; font-weight:500; text-decoration:none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3.2" stroke="#5b6b82" stroke-width="1.9"/><path d="M12 2.5v2.6M12 18.9v2.6M21.5 12h-2.6M5.1 12H2.5M18.7 5.3l-1.8 1.8M7.1 16.9l-1.8 1.8M18.7 18.7l-1.8-1.8M7.1 7.1L5.3 5.3" stroke="#5b6b82" stroke-width="1.9" stroke-linecap="round"/></svg>
        Settings
      </a>
    </nav>

    <!-- Bottom: connection status -->
    <div style="margin-top:auto; padding:14px 12px; border-top:1px solid var(--mb-border); display:flex; align-items:center; gap:10px;">
      <span style="width:8px; height:8px; border-radius:50%; background:var(--mb-success); box-shadow:0 0 0 3px var(--mb-success-tint);"></span>
      <div style="font-size:13px; color:var(--mb-text-2);">ABDM connected</div>
    </div>
  </aside>

  <!-- ===================== MAIN ===================== -->
  <div style="flex:1; display:flex; flex-direction:column; min-width:0;">

    <!-- Top bar -->
    <header style="height:68px; flex:none; background:var(--mb-surface); border-bottom:1px solid var(--mb-border); display:flex; align-items:center; justify-content:space-between; padding:0 28px;">
      <!-- Lab name -->
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:34px; height:34px; border-radius:9px; background:var(--mb-teal-tint); display:flex; align-items:center; justify-content:center;">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M9 3h6v5l4 8.5A2.5 2.5 0 0 1 16.7 20H7.3A2.5 2.5 0 0 1 5 16.5L9 8V3z" stroke="#0a6b62" stroke-width="1.8" stroke-linejoin="round"/><path d="M8 3h8" stroke="#0a6b62" stroke-width="1.8" stroke-linecap="round"/><path d="M7.5 13h9" stroke="#0a6b62" stroke-width="1.8" stroke-linecap="round"/></svg>
        </div>
        <div>
          <div style="font-size:16px; font-weight:700; color:var(--mb-ink); line-height:1.1;">Sunrise Diagnostics</div>
          <div style="font-size:12.5px; color:var(--mb-text-3); margin-top:2px;">Pune · HFR ID 4521-8890</div>
        </div>
      </div>

      <!-- Right: user + logout -->
      <div style="display:flex; align-items:center; gap:18px;">
        <div style="width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--mb-text-2); cursor:pointer;">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M12 4a5 5 0 0 0-5 5v3l-1.6 3h13.2L17 12V9a5 5 0 0 0-5-5z" stroke="#5b6b82" stroke-width="1.9" stroke-linejoin="round"/><path d="M10 19a2 2 0 0 0 4 0" stroke="#5b6b82" stroke-width="1.9" stroke-linecap="round"/></svg>
        </div>
        <div style="width:1px; height:28px; background:var(--mb-border);"></div>
        <div style="display:flex; align-items:center; gap:11px;">
          <div style="width:40px; height:40px; border-radius:50%; background:var(--mb-primary-tint); color:var(--mb-primary-dark); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700;">RD</div>
          <div style="line-height:1.2;">
            <div style="font-size:14px; font-weight:600; color:var(--mb-ink);">Dr. Roshni Deshmukh</div>
            <div style="font-size:12.5px; color:var(--mb-text-3);">Pathologist</div>
          </div>
        </div>
        <div style="height:40px; padding:0 16px; border:1.5px solid var(--mb-border-strong); border-radius:10px; display:flex; align-items:center; gap:8px; font-size:14px; font-weight:600; color:var(--mb-text-2); cursor:pointer;">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M15 5V4a1 1 0 0 0-1-1H6a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1" stroke="#5b6b82" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 12h10m0 0l-3-3m3 3l-3 3" stroke="#5b6b82" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Logout
        </div>
      </div>
    </header>

    <!-- Content area (empty) -->
    <main style="flex:1; padding:32px; min-height:0;">
      <div style="height:100%; border:1.5px dashed var(--mb-border-strong); border-radius:var(--mb-r-lg); background:linear-gradient(180deg, rgba(255,255,255,.5), rgba(255,255,255,0)); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;">
        <div style="width:52px; height:52px; border-radius:13px; background:var(--mb-bg-subtle); display:flex; align-items:center; justify-content:center;">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2.5" stroke="#8a97a8" stroke-width="1.8"/><path d="M3 9h18" stroke="#8a97a8" stroke-width="1.8"/></svg>
        </div>
        <div style="font-size:15px; color:var(--mb-text-3);">Dashboard content area</div>
      </div>
    </main>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}"></script>
</body>
</html>
